version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: web-learn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: web-learn-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      REGISTRY_URL: http://registry:3010
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy

  topic-space:
    build:
      context: .
      dockerfile: services/topic-space/Dockerfile
    container_name: web-learn-topic-space
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TOPIC_SPACE_PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_REGION: ${STORAGE_REGION:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_ACCESS_KEY_SECRET: ${STORAGE_ACCESS_KEY_SECRET:-}
      STORAGE_CDN_BASE: ${STORAGE_CDN_BASE:-}
      REGISTRY_URL: http://registry:3010
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    container_name: web-learn-ai
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AI_PORT: 3003
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      REGISTRY_URL: http://registry:3010
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy

  registry:
    build:
      context: .
      dockerfile: services/registry/Dockerfile
    container_name: web-learn-registry
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REGISTRY_PORT: 3010
    ports:
      - "3010:3010"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: web-learn-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth:3001
      TOPIC_SPACE_SERVICE_URL: http://topic-space:3002
      AI_SERVICE_URL: http://ai:3003
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      registry:
        condition: service_healthy
      auth:
        condition: service_healthy
      topic-space:
        condition: service_healthy
      ai:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local